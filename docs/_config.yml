title: Open Burning Suite
description: >-
  Burn, read, build, and verify CD / DVD / HD DVD / Blu-ray discs on
  Windows, Linux and macOS.
url: "https://openburningsuite.pages.dev"
baseurl: "/OpenBurningSuite"

markdown: kramdown
kramdown:
  input: GFM
  syntax_highlighter: rouge

permalink: pretty

plugins:
  - jekyll-seo-tag
  - jekyll-sitemap

exclude:
  - Gemfile
  - Gemfile.lock
  - vendor

defaults:
  - scope:
      path: ""
    values:
      layout: "default"
  - scope:
      path: "index.md"
    values:
      layout: "home"

sidebar:
  - label: Getting Started
    links:
      - title: Getting Started
        url: /getting-started
  - label: Disc Operations
    links:
      - title: Discover Drives
        url: /discover
      - title: Disc Info
        url: /disc-info
      - title: Burning Discs
        url: /burning
      - title: Reading Discs
        url: /reading
      - title: Building Images
        url: /building-images
      - title: Verification
        url: /verification
      - title: Advanced Utilities
        url: /advanced
  - label: Wizards
    links:
      - title: Audio & Music
        url: /audio-wizard
      - title: Video Disc
        url: /video-wizard
      - title: Data Disc
        url: /data-wizard
      - title: Game Disc
        url: /gaming-discs
      - title: Copy Disc
        url: /copy-wizard
      - title: Blank Disc
        url: /blank-wizard
  - label: Reference
    links:
      - title: Supported Formats
        url: /supported-formats
      - title: Disc Encryption
        url: /encryption
      - title: Settings
        url: /settings
      - title: Architecture
        url: /architecture
      - title: FAQ
        url: /faq
