title: Open Burning Suite
description: >-
  Burn, read, build, and verify CD / DVD / HD DVD / Blu-ray discs on
  Windows, Linux and macOS.
url: "https://marcelofrau.github.io"
baseurl: "/OpenBurningSuite"

markdown: kramdown
kramdown:
  input: GFM
  syntax_highlighter: rouge

permalink: pretty

exclude:
  - Gemfile
  - Gemfile.lock
  - vendor

defaults:
  - scope:
      path: ""
    values:
      layout: "default"
  - scope:
      path: "index.md"
    values:
      layout: "home"

sidebar:
  - label: Getting Started
    links:
      - title: Getting Started
        url: /getting-started
      - title: Burning Discs
        url: /burning
      - title: Reading Discs
        url: /reading
      - title: Building Images
        url: /building-images
      - title: Verification
        url: /verification
      - title: Gaming Discs
        url: /gaming-discs
      - title: Supported Formats
        url: /supported-formats
  - label: Reference
    links:
      - title: Architecture
        url: /architecture
      - title: FAQ
        url: /faq
      - title: Project Status
        url: /status
