title: Open Burning Suite Documentation
description: >-
  Comprehensive documentation for Open Burning Suite — a cross-platform
  CD / DVD / HD DVD / Blu-ray burning desktop utility.
url: "https://svengdk.github.io"
baseurl: "/OpenBurningSuite"

remote_theme: pages-themes/cayman@v0.2.0
plugins:
  - jekyll-remote-theme

markdown: kramdown
kramdown:
  input: GFM
  syntax_highlighter: rouge

permalink: pretty

exclude:
  - Gemfile
  - Gemfile.lock
  - vendor

defaults:
  - scope:
      path: ""
    values:
      layout: "default"

nav:
  - title: Home
    url: /
  - title: Getting Started
    url: /getting-started
  - title: Burning Discs
    url: /burning
  - title: Reading Discs
    url: /reading
  - title: Building Images
    url: /building-images
  - title: Verification
    url: /verification
  - title: Gaming Discs
    url: /gaming-discs
  - title: Supported Formats
    url: /supported-formats
  - title: Architecture
    url: /architecture
  - title: FAQ
    url: /faq
