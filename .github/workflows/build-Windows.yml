name: Build Windows

on:
  workflow_dispatch:
  workflow_call:

permissions:
  contents: write

concurrency:
  group: build-windows-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_VERSION: '8.0.x'
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  DOTNET_NOLOGO: true
  APP_VERSION: '1.1.0'

jobs:
  build-windows:
    name: Windows ${{ matrix.arch }}
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [x64, arm64]
        include:
          - arch: x64
            inno_arch_allowed: x64compatible
            inno_arch_mode: x64compatible
          - arch: arm64
            inno_arch_allowed: arm64
            inno_arch_mode: arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache NuGet packages
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: ${{ runner.os }}-nuget-

      - name: Publish
        run: dotnet publish OpenBurningSuite -c Release -r win-${{ matrix.arch }} -p:PublishReadyToRun=true --self-contained -o publish

      - name: Create ZIP (Portable)
        run: 7z a -tzip -mx=9 OpenBurningSuite-win-${{ matrix.arch }}.zip .\publish\*

      - name: Install Inno Setup
        run: |
          choco install innosetup -y --no-progress
          echo "C:\Program Files (x86)\Inno Setup 6" | Out-File -FilePath $env:GITHUB_PATH -Append

      - name: Create Installer
        shell: pwsh
        run: |
          $iss = @"
          [Setup]
          AppName=Open Burning Suite
          AppVersion=${{ env.APP_VERSION }}
          AppPublisher=SvenGDK
          AppPublisherURL=https://github.com/SvenGDK/OpenBurningSuite
          DefaultDirName={autopf}\OpenBurningSuite
          DefaultGroupName=Open Burning Suite
          UninstallDisplayIcon={app}\OpenBurningSuite.exe
          OutputDir=installer
          OutputBaseFilename=OpenBurningSuite-win-${{ matrix.arch }}-Installer
          Compression=lzma2/ultra64
          SolidCompression=yes
          WizardStyle=modern
          ArchitecturesAllowed=${{ matrix.inno_arch_allowed }}
          ArchitecturesInstallIn64BitMode=${{ matrix.inno_arch_mode }}
          LicenseFile=publish\LICENSE
          PrivilegesRequired=admin

          [Tasks]
          Name: "desktopicon"; Description: "Create a desktop shortcut"; GroupDescription: "Additional shortcuts:"

          [Files]
          Source: "publish\*"; DestDir: "{app}"; Flags: recursesubdirs ignoreversion

          [Icons]
          Name: "{group}\Open Burning Suite"; Filename: "{app}\OpenBurningSuite.exe"
          Name: "{group}\Uninstall Open Burning Suite"; Filename: "{uninstallexe}"
          Name: "{autodesktop}\Open Burning Suite"; Filename: "{app}\OpenBurningSuite.exe"; Tasks: desktopicon

          [Run]
          Filename: "{app}\OpenBurningSuite.exe"; Description: "Launch Open Burning Suite"; Flags: nowait postinstall skipifsilent
          "@
          Set-Content -Path installer.iss -Value $iss -Encoding UTF8
          ISCC installer.iss

      - name: Upload ZIP (Portable)
        uses: actions/upload-artifact@v5
        with:
          name: win-${{ matrix.arch }}-zip
          path: OpenBurningSuite-win-${{ matrix.arch }}.zip
          if-no-files-found: error

      - name: Upload Installer
        uses: actions/upload-artifact@v5
        with:
          name: win-${{ matrix.arch }}-installer
          path: installer/OpenBurningSuite-win-${{ matrix.arch }}-Installer.exe
          if-no-files-found: error

      - name: Upload to Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            OpenBurningSuite-win-${{ matrix.arch }}.zip
            installer/OpenBurningSuite-win-${{ matrix.arch }}-Installer.exe
